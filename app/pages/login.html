<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Producto oceanico</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main>
        <div class="form-container">
            <h1>Iniciar sesión</h1>
            <p>Ingresa tus credenciales para acceder a la aplicación</p>
            <form id="login-form">
                <label for="user" class="sr-only">Nombre de usuario:</label>
                <input type="text" id="user" name="user" placeholder="Nombre de usuario" required>
                <label for="password" class="sr-only">Password:</label>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
                <p class="error escondido">Error al iniciar sesión</p>
            </form>
            <p>¿Todavia no tienes cuenta? <a href="/register">Registrate</a></p>
            
        </div>
    </main>
    <script src="../js/login.js"></script>
</body>
</html>
